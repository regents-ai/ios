openapi: 3.0.3
info:
  title: Regents Mobile API
  version: 0.2.0
  description: |
    Source-of-truth contract for the current Regents Mobile backend surface.

    Mobile wallet flows are live. Mobile Regent records are sourced from Platform projection.
    Talk records are sourced from Platform Regent Work Runtime. The mobile backend only owns
    wallet intent and receipt state needed for phone wallet rails.
x-regent-capability:
  status: beta
  owner: ios
  money_path: true
  cli_surface: false
  mobile_surface: true
x-regent-chat-room-contract:
  owner: ios
  xmtp_room_routes: []
  talk_source: Platform Regent Work Runtime
  transport_boundary: Mobile Talk uses Platform work records and mobile routes. It does not create XMTP rooms today.
paths:
  /health:
    get:
      summary: Check whether the mobile backend is running
      responses:
        '200':
          description: Backend health status
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
  /.well-known/jwks.json:
    get:
      summary: Fetch public keys for Coinbase custom sign-in tokens
      responses:
        '200':
          description: Public signing keys
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '500':
          description: Signing keys are not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/me:
    get:
      summary: Fetch the current signed-in mobile user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current mobile user
          content:
            application/json:
              schema:
                type: object
                required: [userId]
                properties:
                  userId:
                    type: string
  /auth/cdp-token:
    post:
      summary: Create one Coinbase custom sign-in token for the signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Coinbase custom sign-in token
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
        '401':
          description: Sign-in is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Coinbase custom sign-in is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /server/api:
    post:
      summary: Proxy one signed Coinbase request for mobile wallet flows
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoinbaseProxyRequest'
      responses:
        '200':
          description: Coinbase response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid proxy request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Coinbase signing is not configured for this build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /balances/evm:
    get:
      summary: Fetch EVM token balances for one wallet address
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: address
          required: true
          schema:
            type: string
        - in: query
          name: network
          required: false
          schema:
            type: string
            enum: [base, ethereum, base-sepolia, ethereum-sepolia]
      responses:
        '200':
          description: EVM token balances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalanceResponse'
        '400':
          description: Invalid balance request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Coinbase balance access is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /balances/solana:
    get:
      summary: Fetch Solana token balances for one wallet address
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: address
          required: true
          schema:
            type: string
        - in: query
          name: network
          required: false
          schema:
            type: string
            enum: [solana, solana-devnet]
      responses:
        '200':
          description: Solana token balances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalanceResponse'
        '400':
          description: Invalid balance request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Coinbase balance access is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /push-tokens/ping:
    post:
      summary: Record one push-token registration attempt
      responses:
        '200':
          description: Push registration attempt received
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received:
                    type: boolean
  /push-tokens:
    post:
      summary: Register one push token for the signed-in user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPushTokenRequest'
      responses:
        '200':
          description: Push token registered
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        '400':
          description: Push token request is incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Push token belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /push-tokens/debug/{user_id}:
    get:
      summary: Fetch push-token status for the signed-in user or their review mirror
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Push-token status without raw token values
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          description: Push-token status belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /webhooks/onramp:
    post:
      summary: Receive one signed Coinbase onramp webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoinbaseOnrampWebhook'
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received:
                    type: boolean
                  duplicate:
                    type: boolean
        '400':
          description: Webhook body does not match the current contract
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Webhook signature is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Webhook processing failed after verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Webhook verification is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents:
    get:
      summary: List mobile Regent cards
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mobile Regent list
          content:
            application/json:
              schema:
                type: object
                required: [regents]
                properties:
                  regents:
                    type: array
                    items:
                      $ref: '#/components/schemas/RegentSummary'
        '502':
          description: Platform projection is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Platform projection base URL is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}:
    get:
      summary: Fetch one mobile Regent card
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mobile Regent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentDetail'
        '404':
          description: Regent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Platform projection is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Platform projection base URL is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/manager:
    get:
      summary: Fetch one Regent Manager summary
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Regent Manager summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentManagerDetail'
        '404':
          description: Regent Manager summary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/return-requests:
    post:
      summary: Create one Regent-to-wallet return request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
          description: Reuse the same value if the same return request is submitted again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegentReturnRequest'
      responses:
        '201':
          description: Return request created
          content:
            application/json:
              schema:
                type: object
                required: [returnRequest]
                properties:
                  returnRequest:
                    $ref: '#/components/schemas/RegentReturnRequest'
        '404':
          description: Regent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/funding-intents:
    post:
      summary: Create one wallet-to-Regent funding intent
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegentFundingIntent'
      responses:
        '201':
          description: Funding intent created
          content:
            application/json:
              schema:
                type: object
                required: [fundingIntent]
                properties:
                  fundingIntent:
                    $ref: '#/components/schemas/RegentFundingIntent'
        '404':
          description: Regent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/funding-intents/{funding_intent_id}:
    get:
      summary: Fetch one wallet-to-Regent funding intent
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: funding_intent_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Funding intent detail
          content:
            application/json:
              schema:
                type: object
                required: [fundingIntent]
                properties:
                  fundingIntent:
                    $ref: '#/components/schemas/RegentFundingIntent'
        '404':
          description: Funding intent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/funding-intents/{funding_intent_id}/confirm:
    post:
      summary: Confirm one wallet-to-Regent funding intent with a chain receipt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: funding_intent_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmChainReceiptRequest'
      responses:
        '200':
          description: Funding intent confirmed from chain receipt
          content:
            application/json:
              schema:
                type: object
                required: [fundingIntent]
                properties:
                  fundingIntent:
                    $ref: '#/components/schemas/RegentFundingIntent'
        '404':
          description: Funding intent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Chain receipt is not ready or does not match this funding intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Base RPC receipt lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Base RPC is not configured for receipt verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/return-requests/{return_request_id}:
    get:
      summary: Fetch one Regent-to-wallet return request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: return_request_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Return request detail
          content:
            application/json:
              schema:
                type: object
                required: [returnRequest]
                properties:
                  returnRequest:
                    $ref: '#/components/schemas/RegentReturnRequest'
        '404':
          description: Return request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/return-requests/{return_request_id}/confirm:
    post:
      summary: Confirm one Regent return request with a chain receipt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: return_request_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmChainReceiptRequest'
      responses:
        '200':
          description: Return request confirmed from chain receipt
          content:
            application/json:
              schema:
                type: object
                required: [returnRequest]
                properties:
                  returnRequest:
                    $ref: '#/components/schemas/RegentReturnRequest'
        '404':
          description: Return request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Chain receipt is not ready or does not match this return
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Base RPC receipt lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Base RPC is not configured for receipt verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/regents/{id}/base-snapshot:
    get:
      summary: Fetch one mobile-ready Base snapshot for a Regent
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Base snapshot
          content:
            application/json:
              schema:
                type: object
                required: [snapshot]
                properties:
                  snapshot:
                    $ref: '#/components/schemas/BaseRegentSnapshot'
        '404':
          description: Regent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/wallet-actions/{type}/prepare:
    post:
      summary: Prepare one mobile wallet action for signing
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [stake, claim, funding, return]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareWalletActionRequest'
      responses:
        '201':
          description: Wallet action prepared
          content:
            application/json:
              schema:
                type: object
                required: [action]
                properties:
                  action:
                    $ref: '#/components/schemas/PreparedWalletAction'
  /mobile/wallet-actions/{action_id}/confirm:
    post:
      summary: Confirm one prepared wallet action with a chain receipt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: action_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmChainReceiptRequest'
      responses:
        '200':
          description: Wallet action confirmed
          content:
            application/json:
              schema:
                type: object
                required: [action]
                properties:
                  action:
                    $ref: '#/components/schemas/PreparedWalletAction'
        '404':
          description: Wallet action not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Chain receipt is not ready or does not match this action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '410':
          description: Prepared wallet action expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Base RPC receipt lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Base RPC is not configured for receipt verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/terminal/sessions:
    get:
      summary: List mobile Talk sessions from Platform Regent Work Runtime
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mobile Talk session list sourced from Platform RWR work items
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/TerminalSessionSummary'
    post:
      summary: Create one mobile Talk session as a Platform RWR work item and run
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminalSessionRequest'
      responses:
        '201':
          description: Mobile Talk session created from Platform RWR records
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
  /mobile/terminal/sessions/{id}:
    get:
      summary: Fetch one mobile Talk session from Platform Regent Work Runtime
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mobile Talk session detail sourced from Platform RWR
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
        '404':
          description: Mobile terminal session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/terminal/sessions/{id}/events:
    get:
      summary: Fetch new mobile Talk events from Platform Regent Work Runtime
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: since_event_id
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Mobile Talk events sourced from Platform RWR run events and approvals
          content:
            application/json:
              schema:
                type: object
                required: [events, latestEventId]
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/TerminalEvent'
                  latestEventId:
                    type: string
        '404':
          description: Mobile terminal session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/terminal/sessions/{id}/messages:
    post:
      summary: Start a Platform RWR run from one mobile Talk message
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '202':
          description: Mobile Talk session updated from the new Platform RWR run
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
        '404':
          description: Mobile terminal session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile/terminal/sessions/{id}/approvals/{request_id}:
    post:
      summary: Resolve one Platform RWR approval from mobile Talk
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approved, denied]
      responses:
        '200':
          description: Mobile terminal review step updated
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
        '404':
          description: Mobile terminal session or review step not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Review step is expired or already resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegentStatus:
      type: string
      enum: [active, attention, paused]
    RegentRuntimeStatus:
      type: string
      enum: [online, waiting, offline]
    PlatformFormationStatus:
      type: string
      enum: [pending, blocked, provisioning, ready]
    PlatformBillingStatus:
      type: string
      enum: [trial, free-day, prepaid, paused, zero, failed]
    PlatformRuntimeStatus:
      type: string
      enum: [provisioning, ready, paused, blocked]
    RegentPlatformState:
      type: object
      required:
        - claimedName
        - slug
        - formationStatus
        - billingStatus
        - runtimeStatus
        - blockers
        - dashboardUrl
      properties:
        claimedName:
          type: string
        slug:
          type: string
        formationStatus:
          $ref: '#/components/schemas/PlatformFormationStatus'
        billingStatus:
          $ref: '#/components/schemas/PlatformBillingStatus'
        runtimeStatus:
          $ref: '#/components/schemas/PlatformRuntimeStatus'
        blockers:
          type: array
          items:
            type: string
        dashboardUrl:
          type: string
          format: uri
        prepaidBalanceUsd:
          type: string
        freeDayEndsAt:
          type: string
          format: date-time
        nextPauseAt:
          type: string
          format: date-time
    RegentSummary:
      type: object
      required:
        - id
        - name
        - status
        - runtimeStatus
        - walletAddress
        - platformState
