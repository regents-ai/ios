openapi: 3.0.3
info:
  title: Regents Mobile Phase 0 API
  version: 0.1.0
  description: |
    Source-of-truth contract for the current Regents Mobile Phase 0 backend surface.

    Real connected flows in this phase are wallet sign-in, buy, cash-out, and wallet send.
    The agent, Paperclip, and terminal routes below are preview-only sample data used by the mobile app.
paths:
  /mobile-preview/agents:
    get:
      summary: List preview agent cards
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preview agent list
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreviewAgentSummary'
  /mobile-preview/agents/{id}:
    get:
      summary: Fetch one preview agent card
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview agent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewAgentDetail'
        '404':
          description: Preview agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/agents/{id}/paperclip:
    get:
      summary: Fetch one preview Paperclip summary
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview Paperclip summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewPaperclipDetail'
        '404':
          description: Preview Paperclip summary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/agents/{id}/withdrawals:
    post:
      summary: Create one preview return-to-wallet step
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
          description: Reuse the same value if the same preview step is reloaded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePreviewWithdrawalRequest'
      responses:
        '201':
          description: Preview return step created
          content:
            application/json:
              schema:
                type: object
                required: [withdrawal]
                properties:
                  withdrawal:
                    $ref: '#/components/schemas/PreviewAgentWithdrawal'
        '404':
          description: Preview agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/agents/{id}/withdrawals/{withdrawal_id}:
    get:
      summary: Fetch one preview return-to-wallet step
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: withdrawal_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview return step detail
          content:
            application/json:
              schema:
                type: object
                required: [withdrawal]
                properties:
                  withdrawal:
                    $ref: '#/components/schemas/PreviewAgentWithdrawal'
        '404':
          description: Preview return step not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/terminal/sessions:
    get:
      summary: List preview terminal sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preview session list
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreviewTerminalSessionSummary'
    post:
      summary: Create one preview terminal session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePreviewTerminalSessionRequest'
      responses:
        '201':
          description: Preview session created
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/PreviewTerminalSessionDetail'
  /mobile-preview/terminal/sessions/{id}:
    get:
      summary: Fetch one preview terminal session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview session detail
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/PreviewTerminalSessionDetail'
        '404':
          description: Preview session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/terminal/sessions/{id}/events:
    get:
      summary: Fetch preview terminal session events
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview session events
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreviewTerminalEvent'
        '404':
          description: Preview session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/terminal/sessions/{id}/messages:
    post:
      summary: Add one sample note inside a preview terminal session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '202':
          description: Preview session updated
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/PreviewTerminalSessionDetail'
        '404':
          description: Preview session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-preview/terminal/sessions/{id}/approvals/{request_id}:
    post:
      summary: Resolve one sample review step inside a preview terminal session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approved, denied]
      responses:
        '200':
          description: Preview review step updated
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/PreviewTerminalSessionDetail'
        '404':
          description: Preview session or review step not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PreviewAgentStatus:
      type: string
      enum: [active, attention, paused]
    PreviewRuntimeStatus:
      type: string
      enum: [online, waiting, offline]
    PreviewAgentSummary:
      type: object
      required:
        - id
        - name
        - status
        - runtimeStatus
        - walletAddress
        - stablecoinSymbol
        - stablecoinBalance
        - stablecoinBalanceUsd
        - lastActiveAt
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/PreviewAgentStatus'
        runtimeStatus:
          $ref: '#/components/schemas/PreviewRuntimeStatus'
        walletAddress:
          type: string
        stablecoinSymbol:
          type: string
        stablecoinBalance:
          type: string
        stablecoinBalanceUsd:
          type: string
        lastActiveAt:
          type: string
          format: date-time
        treasuryNote:
          type: string
    PreviewAgentActivity:
      type: object
      required: [id, title, detail, at]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        at:
          type: string
          format: date-time
    PreviewAgentWithdrawal:
      type: object
      required:
        - id
        - agentId
        - amount
        - currency
        - destinationWalletAddress
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        agentId:
          type: string
        amount:
          type: string
        currency:
          type: string
        destinationWalletAddress:
          type: string
        status:
          type: string
          enum: [requested, approved, broadcasting, confirmed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PreviewAgentDetail:
      allOf:
        - $ref: '#/components/schemas/PreviewAgentSummary'
        - type: object
          required:
            - runtimeHeadline
            - mission
            - recentActivity
            - withdrawals
          properties:
            runtimeHeadline:
              type: string
            mission:
              type: string
            recentActivity:
              type: array
              items:
                $ref: '#/components/schemas/PreviewAgentActivity'
            withdrawals:
              type: array
              items:
                $ref: '#/components/schemas/PreviewAgentWithdrawal'
    PreviewPaperclipGoal:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        note:
          type: string
    PreviewPaperclipTask:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        owner:
          type: string
        note:
          type: string
    PreviewPaperclipEvent:
      type: object
      required: [id, title, detail, at]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        at:
          type: string
          format: date-time
    PreviewPaperclipRosterMember:
      type: object
      required: [id, name, role, status]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        status:
          type: string
    PreviewPaperclipDetail:
      type: object
      required:
        - agentId
        - headline
        - companySummary
        - dashboardUrl
        - goals
        - activeTasks
        - recentEvents
        - roster
      properties:
        agentId:
          type: string
        headline:
          type: string
        companySummary:
          type: string
        dashboardUrl:
          type: string
        goals:
          type: array
          items:
            $ref: '#/components/schemas/PreviewPaperclipGoal'
        activeTasks:
          type: array
          items:
            $ref: '#/components/schemas/PreviewPaperclipTask'
        recentEvents:
          type: array
          items:
            $ref: '#/components/schemas/PreviewPaperclipEvent'
        roster:
          type: array
          items:
            $ref: '#/components/schemas/PreviewPaperclipRosterMember'
    CreatePreviewWithdrawalRequest:
      type: object
      required: [amount, currency, destinationWalletAddress]
      properties:
        amount:
          type: string
        currency:
          type: string
        destinationWalletAddress:
          type: string
    PreviewTerminalSessionStatus:
      type: string
      enum: [idle, running, waiting, failed]
    PreviewPendingApproval:
      type: object
      required: [requestId, label, details]
      properties:
        requestId:
          type: string
        label:
          type: string
        details:
          type: string
    PreviewTerminalSessionSummary:
      type: object
      required:
        - id
        - title
        - agentId
        - agentName
        - status
        - preview
        - lastUpdatedAt
      properties:
        id:
          type: string
        title:
          type: string
        agentId:
          type: string
        agentName:
          type: string
        status:
          $ref: '#/components/schemas/PreviewTerminalSessionStatus'
        preview:
          type: string
        lastUpdatedAt:
          type: string
          format: date-time
        pendingApproval:
          $ref: '#/components/schemas/PreviewPendingApproval'
    PreviewTerminalSessionDetail:
      allOf:
        - $ref: '#/components/schemas/PreviewTerminalSessionSummary'
        - type: object
          required: [composerPlaceholder]
          properties:
            composerPlaceholder:
              type: string
    CreatePreviewTerminalSessionRequest:
      type: object
      required: [agentId, agentName]
      properties:
        agentId:
          type: string
        agentName:
          type: string
    PreviewTerminalEvent:
      type: object
      required: [type, sessionId, ts]
      properties:
        type:
          type: string
        sessionId:
          type: string
        ts:
          type: string
          format: date-time
        chunk:
          type: string
        text:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        status:
          type: string
        requestId:
          type: string
        label:
          type: string
        details:
          type: string
        result:
          type: string
          enum: [approved, denied, timed_out]
        message:
          type: string
    ErrorEnvelope:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
