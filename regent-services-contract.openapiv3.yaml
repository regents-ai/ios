openapi: 3.0.3
info:
  title: Regents Shared Terminal Services
  version: 0.1.0
  description: Shared session transport contract for Regents mobile terminal access.
paths:
  /terminal/sessions:
    get:
      summary: List terminal sessions for the signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/TerminalSessionSummary'
    post:
      summary: Start a new terminal session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminalSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
  /terminal/sessions/{id}:
    get:
      summary: Fetch one terminal session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /terminal/sessions/{id}/events:
    get:
      summary: Fetch terminal events for a session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session events
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/TerminalEvent'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /terminal/sessions/{id}/messages:
    post:
      summary: Send a message into a session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '202':
          description: Message accepted
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /terminal/sessions/{id}/approvals/{request_id}:
    post:
      summary: Approve or deny a pending tool request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approved, denied]
      responses:
        '200':
          description: Approval resolved
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: '#/components/schemas/TerminalSessionDetail'
        '404':
          description: Session or request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TerminalSessionStatus:
      type: string
      enum: [idle, running, waiting, failed]
    PendingApproval:
      type: object
      required: [requestId, label, details]
      properties:
        requestId:
          type: string
        label:
          type: string
        details:
          type: string
    TerminalSessionSummary:
      type: object
      required:
        - id
        - title
        - agentId
        - agentName
        - status
        - preview
        - lastUpdatedAt
      properties:
        id:
          type: string
        title:
          type: string
        agentId:
          type: string
        agentName:
          type: string
        status:
          $ref: '#/components/schemas/TerminalSessionStatus'
        preview:
          type: string
        lastUpdatedAt:
          type: string
          format: date-time
        pendingApproval:
          $ref: '#/components/schemas/PendingApproval'
    TerminalSessionDetail:
      allOf:
        - $ref: '#/components/schemas/TerminalSessionSummary'
        - type: object
          required: [composerPlaceholder]
          properties:
            composerPlaceholder:
              type: string
    CreateTerminalSessionRequest:
      type: object
      required: [agentId, agentName]
      properties:
        agentId:
          type: string
        agentName:
          type: string
    TerminalEvent:
      type: object
      required: [type, sessionId, ts]
      properties:
        type:
          type: string
        sessionId:
          type: string
        ts:
          type: string
          format: date-time
        chunk:
          type: string
        text:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        status:
          type: string
        requestId:
          type: string
        label:
          type: string
        details:
          type: string
        result:
          type: string
          enum: [approved, denied, timed_out]
        message:
          type: string
    ErrorEnvelope:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
